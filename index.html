<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>泌尿醫學專業網站</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background-color: #f0f4f8;
      color: #1a3a5c;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* 頂部標題區 */
    header {
      width: 100%;
      background-color: #1a3a5c;
      color: white;
      text-align: center;
      padding: 48px 20px 36px;
    }

    header h1 {
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: 4px;
      margin-bottom: 12px;
    }

    header h2 {
      font-size: 1.1rem;
      font-weight: 400;
      letter-spacing: 2px;
      color: #a8c8e8;
    }

    /* 分隔線 */
    .divider {
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg, #1a3a5c, #4a90d9, #1a3a5c);
    }

    /* 索引區 */
    main {
      width: 100%;
      max-width: 900px;
      padding: 60px 20px;
      flex: 1;
    }

    .index-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }

    /* 預留卡片樣式（之後新增索引用）*/
    .card {
      background-color: #ffffff;
      border: 1px solid #c8dff0;
      border-radius: 8px;
      padding: 28px 20px;
      text-align: center;
      text-decoration: none;
      color: #1a3a5c;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 1px;
      transition: all 0.2s ease;
      box-shadow: 0 2px 6px rgba(26,58,92,0.08);
    }

    .card:hover {
      background-color: #1a3a5c;
      color: white;
      transform: translateY(-3px);
      box-shadow: 0 6px 16px rgba(26,58,92,0.2);
    }

    .card .icon {
      font-size: 2rem;
      margin-bottom: 12px;
      display: block;
    }

    /* 頁尾 */
    footer {
      width: 100%;
      background-color: #1a3a5c;
      color: #a8c8e8;
      text-align: center;
      padding: 16px;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

  <header>
    <h1>泌尿醫學專業網站</h1>
    <h2>新光醫院　何承勳 主任</h2>
  </header>

  <div class="divider"></div>

  <main>
    <div class="index-grid">
      <!-- 索引卡片將在這裡陸續新增 -->
    </div>
  </main>

  <footer>
    © 2026 泌尿醫學專業網站　新光醫院 何承勳 主任
  </footer>

</body>
</html>
